services:
  postgres:
    image: postgres:16
    container_name: agentmind_postgres
    environment:
      POSTGRES_USER: agentmind
      POSTGRES_PASSWORD: agentmind
      POSTGRES_DB: agentmind
    ports:
      - "5434:5432"
    volumes:
      - agentmind_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: agentmind_redis
    ports:
      - "6379:6379"

volumes:
  agentmind_postgres_data: